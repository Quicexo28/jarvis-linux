name: Build Windows installer

# Produces the Windows .exe (NSIS) on a Windows runner — it cannot be built on
# Linux without wine. The installer is published as a workflow artifact and, on
# version tags (v*), attached to a GitHub Release. The binary is NEVER committed
# to git; only this workflow file lives in the repo.

on:
  workflow_dispatch: {}
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install root dependencies (electron / electron-builder)
        run: npm install

      - name: Install frontend dependencies
        run: npm install --prefix frontend

      - name: Build app (frontend + electron-builder NSIS)
        run: npm run build:app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-windows-installer
          path: dist-electron/*.exe
          if-no-files-found: error

      - name: Attach installer to release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist-electron/*.exe
